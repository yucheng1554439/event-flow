<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="EventFlow">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMergeNode>
    </filter>
  </defs>
  <rect width="1200" height="320" rx="24" fill="url(#bg)"/>
  <circle cx="1040" cy="72" r="120" fill="#38bdf8" opacity="0.08"/>
  <circle cx="180" cy="260" r="90" fill="#818cf8" opacity="0.10"/>
  <g opacity="0.35" stroke="#38bdf8" stroke-width="1.5" fill="none">
    <path d="M860 88 L980 88 L1040 148 L980 208 L860 208 L800 148 Z"/>
    <path d="M820 148 H920"/>
    <path d="M860 108 V188"/>
    <path d="M980 108 V188"/>
  </g>
  <g filter="url(#glow)">
    <text x="72" y="138" fill="url(#accent)" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="64" font-weight="700">EventFlow</text>
  </g>
  <text x="72" y="186" fill="#cbd5e1" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="24" font-weight="500">Distributed event platform for Kafka, sagas, retries, DLQ, and replay</text>
  <text x="72" y="236" fill="#94a3b8" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="16">REST + gRPC | PostgreSQL | Redis | Prometheus | Kubernetes | Terraform</text>
  <rect x="72" y="262" width="132" height="34" rx="17" fill="#1d4ed8" opacity="0.25" stroke="#60a5fa" stroke-width="1"/>
  <text x="92" y="284" fill="#bfdbfe" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">v1.0.0</text>
  <rect x="220" y="262" width="168" height="34" rx="17" fill="#065f46" opacity="0.25" stroke="#34d399" stroke-width="1"/>
  <text x="240" y="284" fill="#a7f3d0" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">Production-ready OSS</text>
</svg>
