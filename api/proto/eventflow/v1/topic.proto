syntax = "proto3";

package eventflow.v1;

option go_package = "github.com/eventflow/eventflow/api/gen/go/eventflow/v1;eventflowv1";

import "eventflow/v1/common.proto";

service TopicService {
  rpc CreateTopic(CreateTopicRequest) returns (Topic);
  rpc ListTopics(ListTopicsRequest) returns (ListTopicsResponse);
  rpc GetTopic(GetTopicRequest) returns (Topic);
  rpc DeleteTopic(DeleteTopicRequest) returns (DeleteTopicResponse);
}

message CreateTopicRequest {
  string name = 1;
  int32 partitions = 2;
  int32 replication_factor = 3;
  int32 retention_hours = 4;
  string cleanup_policy = 5;
}

message ListTopicsRequest {}
message ListTopicsResponse { repeated Topic topics = 1; }

message GetTopicRequest { string name = 1; }
message DeleteTopicRequest { string name = 1; }
message DeleteTopicResponse { string name = 1; bool deleted = 2; }
