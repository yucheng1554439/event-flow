{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eventflow.name" . }}-redis
  labels:
    {{- include "eventflow.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
      {{- include "eventflow.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: redis
        {{- include "eventflow.labels" . | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          ports:
            - containerPort: 6379
          livenessProbe:
            tcpSocket:
              port: 6379
          readinessProbe:
            tcpSocket:
              port: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "eventflow.name" . }}-redis
spec:
  selector:
    app: redis
    {{- include "eventflow.labels" . | nindent 4 }}
  ports:
    - port: 6379
      targetPort: 6379
{{- end }}
